<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISS MINUTE | TACTICAL HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Minimal Tactical Theme - Marine/Storm Adapted */
            --bg-color: transparent; /* Permette allo sfondo desktop di passare se la finestra è trasparente (es. via Electron o flag browser) */
            --panel-glass: rgba(15, 18, 22, 0.65); /* Grigio tempesta scurissimo */
            --panel-border: rgba(255, 255, 255, 0.08); /* Vetro tagliente e sottile */
            --primary: #ffffff; /* Bianco puro */
            --alert-red: #ff2a2a; /* Rosso emergenza puro, senza sfumature rosate */
            --warning-amber: #fca311; /* Ambra tecnico */
            --text-main: rgba(255, 255, 255, 0.9);
            --text-dim: rgba(255, 255, 255, 0.45);
            
            --font-main: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            
            --blur-radius: 20px;
        }

        * { 
            box-sizing: border-box; 
            user-select: none; /* Look più da app vera e propria */
        }

        body {
            /* Fallback background if not transparent */
            background-color: #0b0c10; 
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0;
            padding: 30px;
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: auto 1fr;
            gap: 30px;
            
            /* Sfondo di test se il browser non supporta la finestra trasparente
               Se lo compili come Widget exe renderai questo sfondo "chroma key" trasparente */
            background-image: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.03) 0%, transparent 60%);
        }

        h1, h2, h3 { 
            margin: 0; 
            font-weight: 600;
            letter-spacing: 1px; 
            text-transform: uppercase;
        }

        /* HEADER */
        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--panel-border);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-family: var(--font-main);
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--primary);
            line-height: 1;
        }

        .logo-sub {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 4px;
            letter-spacing: 2px;
        }

        .clock-container {
            text-align: right;
        }

        .clock {
            font-family: var(--font-mono);
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .date {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* PANELS - FROSTED GLASS EFFECT */
        .panel {
            background: var(--panel-glass);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 24px;
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 
                        inset 0 1px 0 rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .panel-title {
            font-family: var(--font-mono);
            color: var(--text-dim);
            font-size: 10px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .panel-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--text-dim);
            margin-right: 10px;
            border-radius: 1px;
        }

        /* SIDEBAR - DEADLINES */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .deadline-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 16px;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 16px;
            align-items: center;
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), 
                        background 0.2s;
        }

        .deadline-card:hover {
            transform: translateX(4px);
            background: rgba(255, 255, 255, 0.05);
        }

        .deadline-card.urgent { 
            border-left: 3px solid var(--alert-red); 
            background: linear-gradient(90deg, rgba(255,42,42,0.05) 0%, transparent 100%);
        }
        
        .deadline-card.soon { 
            border-left: 3px solid var(--warning-amber); 
        }

        .dl-number {
            font-family: var(--font-mono);
            font-size: 28px;
            font-weight: 700;
            line-height: 1;
        }

        .dl-unit {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-dim);
            text-align: center;
            margin-top: 4px;
        }

        .urgent .dl-number { color: var(--alert-red); }
        .soon .dl-number { color: var(--warning-amber); }

        .dl-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .dl-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .dl-date {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
        }

        /* MAIN AREA */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* FOCUS BOX */
        .focus-box {
            flex: 0 0 auto;
            border: 1px solid rgba(255,255,255,0.2);
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            padding: 40px;
        }

        /* Animazione pulsante molto sottile */
        .focus-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 1px solid var(--primary);
            border-radius: 8px;
            animation: pulse-border 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes pulse-border {
            0% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.01); }
            100% { opacity: 0.1; transform: scale(1); }
        }

        .focus-box .panel-title::before {
            background: var(--primary);
            box-shadow: 0 0 8px var(--primary);
        }

        .focus-project {
            font-size: 56px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: -1px;
            margin: 0 0 10px 0;
            line-height: 1;
        }

        .focus-message {
            font-size: 16px;
            color: var(--text-dim);
            font-weight: 300;
            max-width: 80%;
        }

        /* PROJECT MATRIX */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            flex: 1;
            overflow-y: auto;
            padding-right: 10px; /* Spazio per scrollbar */
        }

        /* Scrollbar custom e minimale */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        .project-card {
            background: rgba(255,255,255,0.015);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            flex-direction: column;
            cursor: default;
        }

        .project-card:hover {
            transform: translateY(-4px);
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .p-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .p-priority { 
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px; 
            border-radius: 3px; 
            letter-spacing: 1px;
        }
        
        .p-p1 { 
            background: rgba(255, 42, 42, 0.15); 
            color: var(--alert-red); 
            border: 1px solid rgba(255, 42, 42, 0.3);
        }
        
        .p-p2 { 
            background: rgba(252, 163, 17, 0.15); 
            color: var(--warning-amber); 
            border: 1px solid rgba(252, 163, 17, 0.3);
        }

        .p-p-other {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .p-name { 
            font-weight: 600; 
            font-size: 18px; 
            color: var(--text-main); 
            margin-bottom: 4px;
        }

        .p-status { 
            font-family: var(--font-mono);
            font-size: 11px; 
            color: var(--text-dim); 
            text-transform: uppercase;
        }

        .p-next { 
            font-size: 13px; 
            color: var(--text-dim); 
            margin-top: auto; 
            padding-top: 16px; 
            border-top: 1px solid rgba(255,255,255,0.05);
            line-height: 1.4;
        }

        /* Overlay sfumato per i progetti non prioritari */
        .project-card.dimmed {
            opacity: 0.4;
            filter: grayscale(100%);
        }
        .project-card.dimmed:hover {
            opacity: 0.8;
            filter: grayscale(0%);
        }

    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <div class="logo">MISS_MINUTE</div>
            <div class="logo-sub">TACTICAL OVERSIGHT SYSTEM v3.0</div>
        </div>
        <div class="clock-container">
            <div class="clock" id="clock">00:00:00</div>
            <div class="date" id="date">-- --- ----</div>
        </div>
    </div>

    <!-- SIDEBAR: DEADLINES -->
    <div class="sidebar panel" style="flex: 0 0 320px;">
        <div class="panel-title">CRITICAL TIMELINES</div>
        <div id="deadlines-container">
            <!-- Loading state -->
            <div class="deadline-card"><div class="dl-details"><div class="dl-title" style="color: var(--text-dim)">Agganciamento dati in corso...</div></div></div>
        </div>
    </div>

    <!-- MAIN AREA -->
    <div class="main-content">
        <!-- FOCUS -->
        <div class="panel focus-box" id="focus-panel">
            <div class="panel-title">PRIMARY DIRECTIVE</div>
            <div class="focus-project" id="focus-project">AWAITING LINK</div>
            <div class="focus-message" id="focus-message">Estrazione dati YAML in corso...</div>
        </div>

        <!-- MATRIX -->
        <div class="panel" style="flex: 1;">
            <div class="panel-title">SYSTEM MATRIX</div>
            <div class="project-grid" id="project-grid">
                <!-- Javascript li riempie -->
            </div>
        </div>
    </div>

    <script>
        // Gestione Orologio
        function updateClock() {
            const now = new Date();
            // Orario HH:MM:SS
            document.getElementById('clock').innerText = now.toLocaleTimeString('it-IT', { hour12: false });
            
            // Data estesa es: 03 MARZO 2026
            const options = { day: '2-digit', month: 'long', year: 'numeric' };
            document.getElementById('date').innerText = now.toLocaleDateString('it-IT', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        function getDaysDiff(dateString) {
            const target = new Date(dateString);
            const now = new Date();
            const diffTime = target - now;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
        }

        async function fetchData() {
            try {
                // Durante i test locali se non c'è il server avvia fallisce quietamente
                const response = await fetch('/api/status'); 
                if(!response.ok) throw new Error("Server non raggiungibile");
                const data = await response.json();
                render(data);
            } catch (e) {
                console.log("In attesa del server python miss_minute_dashboard.py sulla porta 8080...");
            }
        }

        function render(data) {
            // Render Deadlines
            const dlContainer = document.getElementById('deadlines-container');
            if(data.deadlines) {
                dlContainer.innerHTML = '';
                const deadlines = [];
                for (const [key, val] of Object.entries(data.deadlines)) {
                    deadlines.push({ key, ...val, days: getDaysDiff(val.date) });
                }
                deadlines.sort((a, b) => a.days - b.days);

                deadlines.forEach(dl => {
                    let statusClass = '';
                    let daysDisplay = dl.days;
                    let unitDisplay = 'GIORNI';
                    
                    if (dl.days < 0) { 
                        statusClass = 'urgent'; 
                        daysDisplay = "X";
                        unitDisplay = "SCADUTO";
                    }
                    else if (dl.days === 0) {
                        statusClass = 'urgent';
                        daysDisplay = "0";
                        unitDisplay = "OGGI";
                    }
                    else if (dl.days <= 7) statusClass = 'urgent';
                    else if (dl.days <= 14) statusClass = 'soon';

                    dlContainer.innerHTML += `
                        <div class="deadline-card ${statusClass}">
                            <div>
                                <div class="dl-number">${daysDisplay}</div>
                                <div class="dl-unit">${unitDisplay}</div>
                            </div>
                            <div class="dl-details">
                                <div class="dl-title">${dl.description}</div>
                                <div class="dl-date">DATA TARGET: ${dl.date}</div>
                            </div>
                        </div>
                    `;
                });
            }

            // Render Focus
            if (data.focus_mode && data.focus_mode.enabled) {
                document.getElementById('focus-project').innerText = data.focus_mode.current_focus;
                document.getElementById('focus-message').innerText = data.focus_mode.message || "Esegui il deploy prima della scadenza.";
            }

            // Render Projects
            if(data.projects) {
                const grid = document.getElementById('project-grid');
                grid.innerHTML = '';
                
                const projects = [];
                for (const [key, val] of Object.entries(data.projects)) {
                    projects.push({ name: key, ...val });
                }
                projects.sort((a, b) => (a.priority || 99) - (b.priority || 99));

                projects.forEach(p => {
                    let priorityBadge = '';
                    let isDimmed = p.priority > 2 ? 'dimmed' : ''; // I P3 o P4 sono semi-trasparenti
                    
                    if (p.priority === 1) priorityBadge = '<div class="p-priority p-p1">P1 - CRITICAL</div>';
                    else if (p.priority === 2) priorityBadge = '<div class="p-priority p-p2">P2 - HIGH</div>';
                    else priorityBadge = `<div class="p-priority p-p-other">P${p.priority || '?'} - STANDBY</div>`;

                    grid.innerHTML += `
                        <div class="project-card ${isDimmed}">
                            <div class="p-header">${priorityBadge}</div>
                            <div class="p-name">${p.name}</div>
                            <div class="p-status">STATO // ${p.status || 'UNKNOWN'}</div>
                            <div class="p-next">${p.next_action || 'Nessuna azione specificata.'}</div>
                        </div>
                    `;
                });
            }
        }

        // Start 
        fetchData();
        setInterval(fetchData, 10000); // Aggiorna ogni 10s al posto di 30 per maggior responsività
    </script>
</body>
</html>
