# OB1 RADAR - Configurazione algoritmo di discovery
# Unico posto dove si toccano i pesi/soglie/fonti senza toccare codice.
# Aggiornato: 2026-07-01

# --- Universo dei candidati ---------------------------------------------
# Ogni "biblioteca" ha un'indicizzazione diversa - usare la stessa strategia
# di ricerca ovunque produce falsi negativi sistematici, non perche' i dati
# non ci siano ma perche' si cerca con l'approccio sbagliato per quel
# contesto. Tre meccanismi diversi, ciascuno verificato live prima di essere
# scritto (non per ipotesi):
# - Serie C/D: ricerca PER LEGA - Wikidata ha rose strutturate interrogabili
#   via SPARQL (club "in lega" P118 + membership P54 corrente).
# - Giovanili sudamericane: Wikidata NON ha dati strutturati per le rose dei
#   tornei CONMEBOL (verificato: la pagina Wikidata e' solo un placeholder
#   senza claim utili). I dati veri stanno nel testo della pagina Wikipedia
#   corrispondente, in un formato a template regex-estraibile.
# - Pool per cittadinanza: ricerca PER NAZIONALITA', indipendente da dove il
#   giocatore gioca ora (query completamente diversa dalla ricerca per lega -
#   serve quando la domanda e' "chi e' portoghese/eleggibile", non "chi gioca
#   nel campionato portoghese"). ATTENZIONE verificata live: senza il filtro
#   di genere (P21) la query restituisce quasi solo calciatrici donne per
#   questo taglio d'eta' - il filtro genere e' obbligatorio, non opzionale.
#   Molti risultati non hanno un club corrente risolvibile su Wikidata
#   (verificato: 23 su 30 nel test Portogallo) - normale per questa
#   "biblioteca", non un errore: restano candidati validi con dati parziali.
candidate_sources:
  wikidata_leagues:
    # QID Wikidata delle leghe (stabili, non serve aggiornarli a stagione)
    serie_c:
      qid: "Q607965"
      tier: serie_c
    serie_d:
      qid: "Q1141778"
      tier: serie_d

  wikipedia_youth_squads:
    # Titoli pagina Wikipedia esatti da aggiornare quando esce una nuova
    # edizione del torneo (pattern verificato: "{anno} South American
    # U-XX Championship squads"). Tenerne 1-2 per volta, non serve storico.
    - title: "2025 South American U-20 Championship squads"
      tier: conmebol_u20
    - title: "2025 South American U-17 Championship squads"
      tier: conmebol_u17

  wikidata_nationalities:
    # Aggiungere un paese = una voce qui, zero codice da toccare. QID paese
    # + QID genere (Q6581097 maschile, Q6581072 femminile) da wikidata.org.
    # tier "nationality_pool" condivide un'unica eta' di riferimento generica
    # (vedi age_reference) perche' qui non si conosce il livello di lega per
    # la maggior parte dei candidati.
    #
    # % club = quota di candidati con un club corrente risolvibile su
    # Wikidata (diagnostica live, python3 discovery_engine.py diagnose) -
    # bassa % non vuol dire pochi giocatori, vuol dire "molti dati parziali,
    # aspettati piu' flag DATI PARZIALI in UI per questo paese". Nessun
    # pattern per continente/lingua: il Giappone copre meglio del Messico.
    portugal:
      label: "Portogallo"
      country_qid: "Q45"
      gender_qid: "Q6581097"  # 500 candidati, 40% con club

    usa:
      label: "USA"
      country_qid: "Q30"
      gender_qid: "Q6581097"  # 278 candidati, 93% con club (ma spesso mostra
      # la squadra universitaria NCAA invece del club pro - verificato live,
      # e' come Wikidata registra le carriere USA, non un bug qui)

    messico:
      label: "Messico"
