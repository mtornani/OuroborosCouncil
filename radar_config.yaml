# OB1 RADAR - Configurazione algoritmo di discovery
# Unico posto dove si toccano i pesi/soglie/fonti senza toccare codice.
# Aggiornato: 2026-07-01

# --- Universo dei candidati ---------------------------------------------
# Ogni "biblioteca" ha un'indicizzazione diversa - usare la stessa strategia
# di ricerca ovunque produce falsi negativi sistematici, non perche' i dati
# non ci siano ma perche' si cerca con l'approccio sbagliato per quel
# contesto. Tre meccanismi diversi, ciascuno verificato live prima di essere
# scritto (non per ipotesi):
# - Serie C/D: ricerca PER LEGA - Wikidata ha rose strutturate interrogabili
#   via SPARQL (club "in lega" P118 + membership P54 corrente).
# - Giovanili sudamericane: Wikidata NON ha dati strutturati per le rose dei
#   tornei CONMEBOL (verificato: la pagina Wikidata e' solo un placeholder
#   senza claim utili). I dati veri stanno nel testo della pagina Wikipedia
#   corrispondente, in un formato a template regex-estraibile.
# - Pool per cittadinanza: ricerca PER NAZIONALITA', indipendente da dove il
#   giocatore gioca ora (query completamente diversa dalla ricerca per lega -
#   serve quando la domanda e' "chi e' portoghese/eleggibile", non "chi gioca
#   nel campionato portoghese"). ATTENZIONE verificata live: senza il filtro
#   di genere (P21) la query restituisce quasi solo calciatrici donne per
#   questo taglio d'eta' - il filtro genere e' obbligatorio, non opzionale.
#   Molti risultati non hanno un club corrente risolvibile su Wikidata
#   (verificato: 23 su 30 nel test Portogallo) - normale per questa
#   "biblioteca", non un errore: restano candidati validi con dati parziali.
candidate_sources:
  wikidata_leagues:
    # QID Wikidata delle leghe (stabili, non serve aggiornarli a stagione)
    serie_c:
      qid: "Q607965"
      tier: serie_c
    serie_d:
      qid: "Q1141778"
      tier: serie_d

  wikipedia_youth_squads:
    # Titoli pagina Wikipedia esatti da aggiornare quando esce una nuova
    # edizione del torneo (pattern verificato: "{anno} South American
    # U-XX Championship squads"). Tenerne 1-2 per volta, non serve storico.
    - title: "2025 South American U-20 Championship squads"
      tier: conmebol_u20
    - title: "2025 South American U-17 Championship squads"
      tier: conmebol_u17

  wikidata_nationalities:
    # Aggiungere un paese = una voce qui, zero codice da toccare. QID paese
    # + QID genere (Q6581097 maschile, Q6581072 femminile) da wikidata.org.
    # tier "nationality_pool" condivide un'unica eta' di riferimento generica
    # (vedi age_reference) perche' qui non si conosce il livello di lega per
    # la maggior parte dei candidati.
    #
    # % club = quota di candidati con un club corrente risolvibile su
    # Wikidata (diagnostica live, python3 discovery_engine.py diagnose) -
    # bassa % non vuol dire pochi giocatori, vuol dire "molti dati parziali,
    # aspettati piu' flag DATI PARZIALI in UI per questo paese". Nessun
    # pattern per continente/lingua: il Giappone copre meglio del Messico.
    portugal:
      label: "Portogallo"
      country_qid: "Q45"
      gender_qid: "Q6581097"  # 500 candidati, 40% con club

    usa:
      label: "USA"
      country_qid: "Q30"
      gender_qid: "Q6581097"  # 278 candidati, 93% con club (ma spesso mostra
      # la squadra universitaria NCAA invece del club pro - verificato live,
      # e' come Wikidata registra le carriere USA, non un bug qui)

    messico:
      label: "Messico"
      country_qid: "Q96"
      gender_qid: "Q6581097"  # 435 candidati, 41% con club

    nigeria:
      label: "Nigeria"
      country_qid: "Q1033"
      gender_qid: "Q6581097"  # 354 candidati, 45% con club

    senegal:
      label: "Senegal"
      country_qid: "Q1041"
      gender_qid: "Q6581097"  # 209 candidati, 37% con club

    ghana:
      label: "Ghana"
      country_qid: "Q117"
      gender_qid: "Q6581097"  # 321 candidati, 34% con club

    costa_avorio:
      label: "Costa d'Avorio"
      country_qid: "Q1008"
      gender_qid: "Q6581097"  # 219 candidati, 40% con club

    camerun:
      label: "Camerun"
      country_qid: "Q1009"
      gender_qid: "Q6581097"  # 156 candidati, 46% con club

    mali:
      label: "Mali"
      country_qid: "Q912"
      gender_qid: "Q6581097"  # 114 candidati, 50% con club

    marocco:
      label: "Marocco"
      country_qid: "Q1028"
      gender_qid: "Q6581097"  # 264 candidati, 41% con club

    egitto:
      label: "Egitto"
      country_qid: "Q79"
      gender_qid: "Q6581097"  # 89 candidati, 25% con club (pool piu' piccola)

    giappone:
      label: "Giappone"
      country_qid: "Q17"
      gender_qid: "Q6581097"  # 446 candidati (di ~1450 reali), 76% con club

    corea_del_sud:
      label: "Corea del Sud"
      country_qid: "Q884"
      gender_qid: "Q6581097"  # 479 candidati (di ~776 reali), 23% con club

    iran:
      label: "Iran"
      country_qid: "Q794"
      gender_qid: "Q6581097"  # 187 candidati, 50% con club

    australia:
      label: "Australia"
      country_qid: "Q408"
      gender_qid: "Q6581097"  # 217 candidati, 39% con club

    arabia_saudita:
      label: "Arabia Saudita"
      country_qid: "Q851"
      gender_qid: "Q6581097"  # 417 candidati, 22% con club

  # Watchlist manuale: nomi che Mirko vuole SEMPRE nella pool, a prescindere
  # da cosa trovano le query automatiche (riuso di TRACKED_PLAYERS esistente
  # in monitor/web_monitor.py, unito qui).
  manual_watchlist:
    - "Ryan Evaristo"
    - "Andre Maia"
    - "Noah Saviolo"
    - "Bruno Baldini"
    - "Kauan Toledo"
    - "Pietro Saio"
    - "Louis Buffon"

  # Watchlist oriundi FSGC: l'eleggibilita' per discendenza sammarinese non
  # e' deducibile in automatico in modo affidabile (serve l'albero genealogico
  # del giocatore, dato che nessuna fonte libera fornisce). Mirko la cura a
  # mano qui - vuota finche' non la popola lui.
  fsgc_oriundi_watchlist: []

# --- Layer A: eta' di riferimento per tier di competizione ---------------
# Non "il piu' giovane", ma "giovane rispetto al livello che sta gia' reggendo".
# reference_age = eta' tipica per quel tier; spread_years = quanti anni sotto
# la reference_age servono per saturare il punteggio a 1.0 (satura, non premia
# all'infinito un'eta' improbabile - bug di scala). Spread piu' stretto per i
# tornei giovanili (la finestra d'eta' e' gia' vincolata dal regolamento).
age_reference:
  serie_c:
    reference_age: 20
    spread_years: 3
  serie_d:
    reference_age: 21
    spread_years: 3
  conmebol_u20:
    reference_age: 19
    spread_years: 2
  conmebol_u17:
    reference_age: 16
    spread_years: 1.5
  nationality_pool:
    # spread piu' ampio degli altri tier: qui non si conosce il livello di
    # lega esatto per la maggior parte dei candidati (verificato: club
    # corrente risolvibile su Wikidata solo per una minoranza), quindi si
    # accetta una finestra piu' larga invece di finti falsi negativi
    reference_age: 20
    spread_years: 5

# --- Layer A: pesi del Signal Score ---------------------------------------
# 50/50 e' un punto di partenza dichiarato, NON un valore validato: con solo
# due componenti liberamente disponibili non c'e' ancora evidenza per pesarle
# diversamente. Vanno corrette quando radar_feed.json avra' abbastanza storico
# per un riscontro reale (vedi sezione "verifica nel tempo" del piano).
signal_score_weights:
  age_vs_level: 0.5
  buzz: 0.5

# --- Layer A: sotto-pesi del Buzz Score -----------------------------------
buzz_weights:
  velocity: 0.4
  niche_source_tier: 0.35
  geographic_crossing: 0.25
  # oltre questo numero di menzioni totali, il giocatore e' considerato
  # "gia' mainstream" e il buzz viene penalizzato invece che premiato
  mainstream_mention_threshold: 30

# Tier delle fonti per il segnale "niche_source_tier".
# NOTA: Google News RSS restituisce link di redirect (news.google.com/...),
# non l'URL reale della testata (verificato live) - quindi la classificazione
# si fa sul NOME della testata, che Google News mette in coda al titolo
# ("Headline - Nome Testata"), non sul dominio dell'URL.
# Tier 3 = stampa locale/di nicchia (bonus alto), Tier 1 = testate big
# (una volta che parlano loro, il vantaggio e' gia' sfumato).
source_tiers:
  tier_1:
    - "Gazzetta dello Sport"
    - "Corriere dello Sport"
    - "Sky Sport"
    - "ESPN"
    - "BBC"
    - "Goal.com"
    - "Tuttosport"
  tier_2:
    - "TuttoMercatoWeb"
    - "Calciomercato.com"
    - "Tuttocalciatori"
    - "Transfermarkt"
  # tutto il resto (stampa locale/regionale, siti di club, testate estere
  # minori) e' trattato come tier 3 di default: e' li' che nasce il segnale.

# --- Layer B: profili contestuali (Fit Score) -----------------------------
# Nessun modello: solo filtri booleani + moltiplicatori applicati al
# Signal Score. Selezionabili come chip rapidi in UI.
purpose_profiles:
  resale_value:
    label: "Rivendita"
    description: "Punta sull'upside: eta' relativa e velocita' del buzz contano di piu'."
    weight_multipliers:
      age_vs_level: 1.3
      buzz: 1.2
    max_tier: [serie_c, serie_d, conmebol_u20, conmebol_u17, nationality_pool]

  first_team_need:
    label: "Rosa Serie C"
    description: "Punta su conferme piu' solide, sconta l'hype puro del buzz."
    weight_multipliers:
      age_vs_level: 1.0
      buzz: 0.7
    # esclude nationality_pool: qui serve chi puo' giocare in Serie C ORA,
    # non un pool sparso ovunque nel mondo senza club noto
    max_tier: [serie_c, serie_d]

  tactical_profile:
    label: "Profilo tattico"
    description: "Nessun bonus/malus di score, solo filtro per ruolo."
    weight_multipliers:
      age_vs_level: 1.0
      buzz: 1.0
    max_tier: [serie_c, serie_d, conmebol_u20, conmebol_u17, nationality_pool]

  fsgc_oriundi:
    label: "Oriundi FSGC"
    description: "Bacino piccolo apposta: filtra solo la watchlist oriundi, non l'intera pool."
    weight_multipliers:
      age_vs_level: 0.8
      buzz: 0.8
    max_tier: [serie_c, serie_d, conmebol_u20, conmebol_u17, nationality_pool]
    restrict_to_watchlist: fsgc_oriundi_watchlist

# --- Swarm dossier ----------------------------------------------------------
swarm:
  top_n_candidates_for_swarm: 15
  # rigira il dossier solo se il Signal Score e' cambiato di almeno questa
  # soglia dall'ultimo dossier salvato, per non sprecare quota OpenRouter
  # ripremendo "Aggiorna" piu' volte al giorno sugli stessi candidati.
  rerun_threshold_points: 8

# --- Performance ------------------------------------------------------------
# La pool candidati e' nell'ordine delle centinaia (Serie C/D + CONMEBOL).
# Il controllo buzz fa una chiamata di rete per candidato: farlo su tutti a
# ogni "Aggiorna" significherebbe minuti di attesa da telefono. Si pre-filtra
# per eta'-relativa-al-livello (gratis, zero rete) e si controlla il buzz
# solo sul sottoinsieme piu' promettente, in parallelo.
performance:
  buzz_check_pool_size: 60
  buzz_check_workers: 8
